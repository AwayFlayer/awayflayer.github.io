<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer</title>
    <link rel="icon" href="assets/analyzer.ico">
    <link rel="stylesheet" href="css/analyzerStyles.css">
    <link rel="stylesheet" href="css/analyzerFiles.css">
    <link rel="stylesheet" href="css/analyzerCharts.css">
    <link rel="stylesheet" href="css/analyzerZoom.css">
    <link rel="stylesheet" href="css/analyzerEffects.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <header>
            <h1>Statistics Analyzer</h1>
        </header>

        <section class="file-upload-section">
            <div class="upload-container">
                <label for="file-upload" class="file-upload-label">
                    <svg class="upload-icon" viewBox="0 0 24 24">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <span>Choose JSON Files</span>
                </label>
                <input type="file" id="file-upload" accept=".json" multiple>
            </div>
            
            <div id="selected-files">
                <h3>Selected Files</h3>
                <ul id="file-list" class="file-list">
                    <li class="empty-message">No files selected</li>
                </ul>
            </div>
        </section>

        <section class="visualization-section">
            <div class="chart-controls">
                <div class="chart-type-toggles">
                    <button type="button" id="pie-chart-btn" class="chart-btn active" data-chart-type="pie">
                        <span>Pie Chart</span>
                    </button>
                    <button type="button" id="bar-chart-btn" class="chart-btn" data-chart-type="bar">
                        <span>Bar Chart</span>
                    </button>
                </div>
                <div class="chart-instructions">
                    <span class="instruction-text">Scroll to zoom, drag to pan, double-click to reset view</span>
                </div>
            </div>
            
            <div id="chart-container" class="chart-container">
                <div class="empty-chart-message">
                    <p>Select JSON files to see visualization</p>
                </div>
            </div>
            
            <div id="chart-legend" class="chart-legend"></div>
        </section>

        <section class="data-section">
            <h2>Data Summary</h2>
            <div id="data-summary" class="data-summary">
                <p class="empty-message">No data to display</p>
            </div>
        </section>
    </div>

    <script type="module" src="js/analyzerApp.js"></script>
</body>
</html>
