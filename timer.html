<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="icon" href="assets/timer.ico">
    <link rel="stylesheet" href="css/timerStyles.css">
    <link rel="stylesheet" href="css/timerButtons.css">
</head>
<body>
    <main>
        <section id="controls">
            <button type="button" id="startStop">Start</button>
            <button type="button" id="clearAll">Clear All</button>
            <button type="button" id="exportTimers">Export</button>
            <button type="button" id="importTimers">Import</button>
        </section>
        <section id="timers" class="timers"></section>
    </main>
    <script src="js/timerUtils.js"></script>
    <script src="js/timerHandlers.js"></script>
    <script src="js/timerDisplay.js"></script>
    <script src="js/timerControl.js"></script>
    <script>
        document.getElementById('startStop').addEventListener('click', startStopTimers);
        document.getElementById('clearAll').addEventListener('click', confirmAndClearAllTimers);
        document.getElementById('exportTimers').addEventListener('click', exportTimers);
        document.getElementById('importTimers').addEventListener('click', importTimers);
    </script>
</body>
</html>
